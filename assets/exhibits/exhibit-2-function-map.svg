<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 980 620" role="img" aria-labelledby="e2t e2d" font-family="Georgia, 'Source Serif 4', serif">
  <title id="e2t">Function Map: Broadcast versus Podsphere</title>
  <desc id="e2d">A grid rating journalism's democratic functions across three eras. Broadcast at peak performs all five strongly. Legacy broadcast in 2026 performs each only partially. The podsphere in 2026 does not structurally perform the common information environment, agenda-setting at scale, or source credentialing; it performs accountability journalism strongly and builds audience trust differently — parasocial rather than institutional.</desc>
  <rect x="0" y="0" width="980" height="620" rx="16" fill="#f7f2e8"/>
  <text x="490" y="44" text-anchor="middle" font-size="26" font-weight="700" fill="#15323a">Function Map: Broadcast vs. Podsphere</text>
  <text x="490" y="72" text-anchor="middle" font-size="14" fill="#61706f">Which democratic functions survive the format change?</text>

  <!-- column headers -->
  <text x="414" y="116" text-anchor="middle" font-size="14.5" font-weight="700" fill="#15323a">Broadcast</text>
  <text x="414" y="134" text-anchor="middle" font-size="12.5" fill="#61706f">peak era</text>
  <text x="632" y="116" text-anchor="middle" font-size="14.5" font-weight="700" fill="#15323a">Legacy broadcast</text>
  <text x="632" y="134" text-anchor="middle" font-size="12.5" fill="#61706f">2026</text>
  <text x="850" y="116" text-anchor="middle" font-size="14.5" font-weight="700" fill="#15323a">Podsphere</text>
  <text x="850" y="134" text-anchor="middle" font-size="12.5" fill="#61706f">2026</text>

  <!-- Row 1 -->
  <text x="30" y="182" font-size="13.5" fill="#14323a">Common information</text>
  <text x="30" y="200" font-size="13.5" fill="#14323a">environment</text>
  <rect x="308" y="150" width="212" height="72" rx="8" fill="#1f6f78"/><text x="414" y="191" text-anchor="middle" font-size="15" font-weight="700" fill="#ffffff">Strong</text>
  <rect x="526" y="150" width="212" height="72" rx="8" fill="#d8b25a"/><text x="632" y="191" text-anchor="middle" font-size="15" font-weight="700" fill="#4a3a12">Partial</text>
  <rect x="744" y="150" width="212" height="72" rx="8" fill="#b5563f"/><text x="850" y="191" text-anchor="middle" font-size="15" font-weight="700" fill="#ffffff">Absent</text>

  <!-- Row 2 -->
  <text x="30" y="275" font-size="13.5" fill="#14323a">Agenda-setting at scale</text>
  <rect x="308" y="230" width="212" height="72" rx="8" fill="#1f6f78"/><text x="414" y="271" text-anchor="middle" font-size="15" font-weight="700" fill="#ffffff">Strong</text>
  <rect x="526" y="230" width="212" height="72" rx="8" fill="#d8b25a"/><text x="632" y="271" text-anchor="middle" font-size="15" font-weight="700" fill="#4a3a12">Partial</text>
  <rect x="744" y="230" width="212" height="72" rx="8" fill="#b5563f"/><text x="850" y="271" text-anchor="middle" font-size="15" font-weight="700" fill="#ffffff">Absent</text>

  <!-- Row 3 -->
  <text x="30" y="346" font-size="13.5" fill="#14323a">Credentialing of</text>
  <text x="30" y="364" font-size="13.5" fill="#14323a">sources &amp; claims</text>
  <rect x="308" y="310" width="212" height="72" rx="8" fill="#1f6f78"/><text x="414" y="351" text-anchor="middle" font-size="15" font-weight="700" fill="#ffffff">Strong</text>
  <rect x="526" y="310" width="212" height="72" rx="8" fill="#d8b25a"/><text x="632" y="351" text-anchor="middle" font-size="15" font-weight="700" fill="#4a3a12">Partial</text>
  <rect x="744" y="310" width="212" height="72" rx="8" fill="#b5563f"/><text x="850" y="351" text-anchor="middle" font-size="15" font-weight="700" fill="#ffffff">Absent</text>

  <!-- Row 4 -->
  <text x="30" y="434" font-size="13.5" fill="#14323a">Accountability journalism</text>
  <rect x="308" y="390" width="212" height="72" rx="8" fill="#1f6f78"/><text x="414" y="431" text-anchor="middle" font-size="15" font-weight="700" fill="#ffffff">Strong</text>
  <rect x="526" y="390" width="212" height="72" rx="8" fill="#d8b25a"/><text x="632" y="431" text-anchor="middle" font-size="15" font-weight="700" fill="#4a3a12">Partial</text>
  <rect x="744" y="390" width="212" height="72" rx="8" fill="#1f6f78"/><text x="850" y="431" text-anchor="middle" font-size="15" font-weight="700" fill="#ffffff">Strong</text>

  <!-- Row 5 -->
  <text x="30" y="514" font-size="13.5" fill="#14323a">Audience trust</text>
  <rect x="308" y="470" width="212" height="72" rx="8" fill="#1f6f78"/><text x="414" y="506" text-anchor="middle" font-size="15" font-weight="700" fill="#ffffff">Strong</text><text x="414" y="524" text-anchor="middle" font-size="11" fill="#cfe6e8">institutional</text>
  <rect x="526" y="470" width="212" height="72" rx="8" fill="#d8b25a"/><text x="632" y="511" text-anchor="middle" font-size="15" font-weight="700" fill="#4a3a12">Partial</text>
  <rect x="744" y="470" width="212" height="72" rx="8" fill="#4a6d8c"/><text x="850" y="506" text-anchor="middle" font-size="15" font-weight="700" fill="#ffffff">Different</text><text x="850" y="524" text-anchor="middle" font-size="11" fill="#d6e2ec">parasocial</text>

  <!-- legend -->
  <rect x="120" y="566" width="14" height="14" rx="3" fill="#1f6f78"/><text x="140" y="578" font-size="12.5" fill="#14323a">performs well</text>
  <rect x="270" y="566" width="14" height="14" rx="3" fill="#d8b25a"/><text x="290" y="578" font-size="12.5" fill="#14323a">partial</text>
  <rect x="380" y="566" width="14" height="14" rx="3" fill="#b5563f"/><text x="400" y="578" font-size="12.5" fill="#14323a">not structural</text>
  <rect x="540" y="566" width="14" height="14" rx="3" fill="#4a6d8c"/><text x="560" y="578" font-size="12.5" fill="#14323a">performs differently</text>

  <text x="490" y="604" text-anchor="middle" font-size="12.5" font-style="italic" fill="#61706f">The podsphere is strong on accountability and builds trust differently — but does not structurally provide a shared information environment, agenda-setting, or credentialing.</text>
</svg>